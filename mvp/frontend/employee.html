<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Portal | Cognitive Interface</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.4);
            --secondary: #1e293b;
            --accent: #8b5cf6;
            --bg-dark: #020617;
            --bg-panel: rgba(15, 23, 42, 0.8);
            --border: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --success: #10b981;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.05) 0px, transparent 50%);
        }

        /* Sidebar */
        .sidebar {
            width: 80px;
            background: rgba(2, 6, 23, 0.95);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 0;
            gap: 32px;
            z-index: 100;
        }

        .nav-item {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--text-muted);
            border: 1px solid transparent;
        }

        .nav-item:hover { background: rgba(255, 255, 255, 0.05); color: var(--text-main); }
        .nav-item.active { 
            background: rgba(59, 130, 246, 0.1); 
            color: var(--primary); 
            border-color: var(--primary-glow);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .nav-item svg { width: 22px; height: 22px; fill: currentColor; }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 32px 40px;
            gap: 32px;
            overflow: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            background: rgba(16, 185, 129, 0.05);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
            color: var(--success);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); box-shadow: 0 0 10px var(--success); }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 32px;
            flex: 1;
            overflow: hidden;
        }

        .glass-panel {
            background: var(--bg-panel);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .panel-header {
            padding: 20px 28px;
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .panel-header svg { width: 16px; height: 16px; fill: var(--primary); }

        /* Incoming Message Area */
        .message-viewport {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
        }

        .request-banner {
            position: absolute;
            top: 32px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid var(--primary-glow);
            padding: 24px 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
            animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 50;
        }

        @keyframes slideDown { from { transform: translateX(-50%) translateY(-20px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }

        .request-banner.visible { display: block; }

        .request-banner h3 { font-size: 14px; margin-bottom: 16px; color: var(--primary); }

        .btn-group { display: flex; gap: 12px; }

        .btn-action {
            padding: 10px 24px;
            border-radius: 12px;
            border: none;
            font-family: inherit;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .btn-accept { background: var(--primary); color: white; box-shadow: 0 4px 12px var(--primary-glow); }
        .btn-decline { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }

        .incoming-msg-display {
            text-align: center;
            transition: all 0.5s ease;
        }

        .incoming-msg-display.empty { opacity: 0.2; transform: scale(0.9); }

        .big-text {
            font-size: 56px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 24px;
            background: linear-gradient(135deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }

        .msg-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        .badge {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .badge-purple { background: rgba(139, 92, 246, 0.1); color: #c4b5fd; border: 1px solid rgba(139, 92, 246, 0.2); }
        .badge-green { background: rgba(16, 185, 129, 0.1); color: var(--success); }

        /* Control Panel */
        .control-panel {
            padding: 28px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .input-wrapper {
            position: relative;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 6px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 16px 20px;
            font-family: inherit;
            font-size: 16px;
            outline: none;
        }

        .btn-send {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: var(--primary);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-send:hover { background: #60a5fa; transform: scale(1.05); }
        .btn-send svg { width: 20px; height: 20px; fill: white; }

        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .reply-chip {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.2s;
        }

        .reply-chip:hover { background: rgba(59, 130, 246, 0.1); border-color: var(--primary); color: white; }

        .event-log {
            flex: 1;
            overflow-y: auto;
            padding-right: 8px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .log-entry {
            padding: 16px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.02);
            border-left: 3px solid transparent;
            animation: fadeIn 0.3s ease;
        }

        .log-entry.rx { border-left-color: var(--accent); }
        .log-entry.tx { border-left-color: var(--primary); }

        .log-meta { font-size: 10px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
        .log-text { font-size: 14px; line-height: 1.5; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 2px; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="nav-item active">
            <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
        </div>
        <div class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
        </div>
        <div class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.56-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.49-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        </div>
    </aside>

    <main class="main-content">
        <header>
            <h1>Command Interface</h1>
            <div class="status-pill">
                <div class="status-dot"></div>
                Link Secure
            </div>
        </header>

        <div class="dashboard-grid">
            <div class="glass-panel">
                <div class="panel-header">
                    <svg viewBox="0 0 24 24"><path d="M21 15V6H3v9h18m0-11a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V6c0-1.11.89-2 2-2h18M3 19h18v2H3v-2z"/></svg>
                    Live Kiosk Transmission
                </div>
                
                <div class="message-viewport">
                    <div class="request-banner" id="sessionRequest">
                        <h3>Inbound Handshake Request</h3>
                        <div class="btn-group">
                            <button class="btn-action btn-accept" onclick="acceptSession()">Establish Link</button>
                            <button class="btn-action btn-decline" onclick="declineSession()">Abort</button>
                        </div>
                    </div>

                    <div class="incoming-msg-display empty" id="msgDisplay">
                        <div class="big-text" id="messageText">AWAITING UPLINK</div>
                        <div class="msg-info" id="messageMeta" style="display:none;">
                            <span class="badge badge-purple" id="messageWord">SIGN</span>
                            <span class="badge badge-green" id="messageConfidence">0%</span>
                        </div>
                    </div>
                </div>

                <div class="control-panel">
                    <div class="input-wrapper">
                        <input type="text" id="replyInput" placeholder="Enter manual transmission data..." onkeydown="if(event.key==='Enter') sendReply()">
                        <button class="btn-send" onclick="sendReply()">
                            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                        </button>
                    </div>
                    <div class="quick-replies">
                        <div class="reply-chip" onclick="quickReply('Please wait a moment')">Please Wait</div>
                        <div class="reply-chip" onclick="quickReply('Please show your ID')">Request ID</div>
                        <div class="reply-chip" onclick="quickReply('I have processed your request')">Completed</div>
                        <div class="reply-chip" onclick="quickReply('Could you sign that again?')">Repeat Sign</div>
                    </div>
                </div>
            </div>

            <div class="glass-panel">
                <div class="panel-header">
                    <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                    Transmission Logs
                </div>
                <div class="card-body" style="padding: 24px; overflow: hidden; display: flex; flex-direction: column;">
                    <div class="event-log" id="historyList">
                        <!-- Logs injected here -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const socket = io(location.origin, { transports: ['websocket'] });
        let sessionId = null;

        const $ = id => document.getElementById(id);
        const msgText = $('messageText'), msgWord = $('messageWord'), msgConf = $('messageConfidence');
        const sessionRequest = $('sessionRequest'), msgDisplay = $('msgDisplay'), historyList = $('historyList');

        socket.on('connect', () => socket.emit('join_employee'));

        socket.on('session_request', (data) => {
            sessionId = data.session_id;
            sessionRequest.classList.add('visible');
        });

        socket.on('message_to_employee', (data) => {
            sessionId = data.session_id;
            msgText.textContent = `"${data.sentence}"`;
            msgDisplay.classList.remove('empty');
            msgWord.textContent = data.word.toUpperCase();
            msgConf.textContent = Math.round(data.confidence * 100) + '%';
            $('messageMeta').style.display = 'flex';
            
            addToLog('rx', data.sentence);
        });

        socket.on('session_status', (data) => {
            if (data.status === 'ended') {
                sessionId = null;
                sessionRequest.classList.remove('visible');
                msgText.textContent = 'AWAITING UPLINK';
                msgDisplay.classList.add('empty');
                $('messageMeta').style.display = 'none';
            }
        });

        function acceptSession() {
            socket.emit('session_accepted', { session_id: sessionId });
            sessionRequest.classList.remove('visible');
            addToLog('sys', 'Satellite Link Established');
        }

        function declineSession() {
            socket.emit('session_declined', { session_id: sessionId });
            sessionRequest.classList.remove('visible');
            sessionId = null;
        }

        function sendReply(textOverride = null) {
            const text = textOverride || $('replyInput').value.trim();
            if (!text) return;
            socket.emit('employee_reply', { session_id: sessionId, reply_text: text });
            addToLog('tx', text);
            $('replyInput').value = '';
        }

        function quickReply(text) { sendReply(text); }

        function addToLog(type, text) {
            const entry = document.createElement('div');
            entry.className = 'log-entry ' + type;
            const time = new Date().toLocaleTimeString();
            const source = type === 'rx' ? 'Incoming' : type === 'tx' ? 'Outgoing' : 'System';
            entry.innerHTML = `<div class="log-meta">${source} • ${time}</div><div class="log-text">${text}</div>`;
            historyList.appendChild(entry);
            historyList.scrollTop = historyList.scrollHeight;
        }
    </script>
</body>
</html>
